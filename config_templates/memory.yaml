# Template: Memory Server
# Persistent knowledge graph sidecar. Gives the agent long-term memory across sessions.
# Generally safe — only restrict the ability to delete memories.
# Install: npx -y @modelcontextprotocol/server-memory

version: "1.0"
network:
  port: 8083
  public_url: "http://localhost:8083"
auth:
  require_bearer_token: "<YOUR_SECRET_TOKEN>"
audit_log_path: "audit.log"

mcp_servers:
  memory:
    upstream: "exec:npx -y @modelcontextprotocol/server-memory"

    policies:
      access_mode: "allowlist"
      allowed_tools:
        - "create_entities"
        - "create_relations"
        - "add_observations"
        - "read_graph"
        - "search_nodes"
        - "open_nodes"
        # Destructive tools — uncomment only if you trust the agent to self-manage memory:
        # - "delete_entities"
        # - "delete_observations"
        # - "delete_relations"

      rate_limit:
        max_requests: 60
        window_seconds: 60
